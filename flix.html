    <script src="flix.js">
    <!-- movies sections end -->
// Wait until the entire HTML document is loaded
document.addEventListener('DOMContentLoaded', (event) => {
    // 1. Get all the movie poster images
    const posters = document.querySelectorAll('.poster');
    
    // 2. Get the main details section and its sub-elements
    const detailsSection = document.getElementById('movie-details-section');
    const trailerFrame = document.getElementById('movie-trailer');
    const movieTitle = document.getElementById('movie-title');
    const movieDescription = document.getElementById('movie-description');
    
    // 3. Loop through each poster and add a click event listener
    posters.forEach(poster => {
        poster.addEventListener('click', () => {
            // A. Get data from the clicked image using the 'data-...' attributes
            const title = poster.getAttribute('data-title');
            const videoUrl = poster.getAttribute('data-video-url');
            const description = poster.getAttribute('data-description');
            
            // B. Update the content in the details section
            movieTitle.textContent = title;
            movieDescription.textContent = description;
            
            // C. Update the video source (This starts the video playing automatically due to the '?autoplay=1' in the URL)
            trailerFrame.src = videoUrl;
            
            // D. Make the entire details section visible (if it was hidden)
            detailsSection.style.display = 'block';
            
            // Optional: Scroll to the details section for a better user experience
            detailsSection.scrollIntoView({ behavior: 'smooth' });
        });
    });
});
</script>
